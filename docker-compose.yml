services:
  livox-recorder:
    image: iserverobotics/livox_recorder:jazzy
    container_name: livox-recorder
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - LIDAR_INTERFACE=${LIDAR_INTERFACE:-eth0}
      - LIDAR_COMPUTER_IP=${LIDAR_COMPUTER_IP:-192.168.1.5}
      - LIDAR_IP=${LIDAR_IP:-192.168.1.116}
    volumes:
      - ./bags:/ros2_ws/bags
    shm_size: '2g'
    restart: unless-stopped

  s3-upload:
    image: amazon/aws-cli:latest
    container_name: s3-upload
    env_file:
      - aws_key.env
    volumes:
      - ./bags:/bags:ro
    entrypoint: >
      sh -c '
        cd /bags &&
        echo "Uploading to s3://$${S3_BUCKET}/$${S3_PREFIX}/ ..." &&
        aws s3 sync . "s3://$${S3_BUCKET}/$${S3_PREFIX}/" --exclude "*/lock/*" 2>&1 ;
        echo "" &&
        echo "Verifying upload..." &&
        LOCAL_COUNT=$$(find . -type f ! -path "*/lock/*" | wc -l) &&
        REMOTE_COUNT=$$(aws s3 ls "s3://$${S3_BUCKET}/$${S3_PREFIX}/" --recursive | wc -l) &&
        if [ "$$LOCAL_COUNT" -ne "$$REMOTE_COUNT" ]; then
          echo "WARNING: Local has $$LOCAL_COUNT files but S3 has $$REMOTE_COUNT. Retrying sync..." &&
          aws s3 sync . "s3://$${S3_BUCKET}/$${S3_PREFIX}/" --exclude "*/lock/*" 2>&1 &&
          REMOTE_COUNT=$$(aws s3 ls "s3://$${S3_BUCKET}/$${S3_PREFIX}/" --recursive | wc -l) &&
          if [ "$$LOCAL_COUNT" -ne "$$REMOTE_COUNT" ]; then
            echo "ERROR: Upload incomplete. Local: $$LOCAL_COUNT files, S3: $$REMOTE_COUNT files" &&
            exit 1
          ; fi
        ; fi &&
        echo "Verified: all $$LOCAL_COUNT files uploaded." &&
        echo "" &&
        echo "Uploaded files:" &&
        find . -type f ! -path "*/lock/*" -exec ls -lh {} \; | awk "{printf \"  %s %s\n\", \$$5, \$$NF}" &&
        echo "" && echo "Thank you for contributing to the eval pipeline!" && echo ""
      '
    profiles:
      - upload
